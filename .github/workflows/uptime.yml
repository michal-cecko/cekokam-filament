name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check sites
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, urllib.request, urllib.error

          SITES = [
              "https://cecko.dev",
              "https://synapps.sk",
              "https://adminka.synapps.sk",
              "https://bcz-club.com",
              "https://admin.cekokam.sk",
              "https://cekokam.sk",
          ]
          GH_TOKEN = os.environ["GH_TOKEN"]
          REPO = os.environ["REPO"]
          TG_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
          TG_CHAT = os.environ["TELEGRAM_CHAT_ID"]
          API = f"https://api.github.com/repos/{REPO}/actions/variables/UPTIME_SITES"
          HEADERS = {"Authorization": f"Bearer {GH_TOKEN}", "Accept": "application/vnd.github+json"}

          # ── Check each site ─────────────────────────────────────────
          current = {}
          for site in SITES:
              try:
                  result = subprocess.run(
                      ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "--max-time", "10", site],
                      capture_output=True, text=True, timeout=15)
                  code = int(result.stdout.strip() or "0")
              except Exception:
                  code = 0
              current[site] = "UP" if 200 <= code < 400 else f"DOWN:{code}"
              print(f"{site} → {current[site]}")

          # ── Read previous per-site state ────────────────────────────
          prev = {}
          try:
              req = urllib.request.Request(API, headers=HEADERS)
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              prev = json.loads(data.get("value", "{}"))
          except Exception as e:
              print(f"Could not read prev state: {e}")

          # ── Determine changes ───────────────────────────────────────
          now_down = {s: code for s, code in current.items() if code != "UP"}
          now_up = {s for s in SITES if current[s] == "UP"}
          was_down = {s for s, v in prev.items() if v != "UP"}
          recovered = was_down & now_up
          still_down = {s for s in now_down if s in was_down}
          newly_down = {s for s in now_down if s not in was_down}

          # ── Build notification ──────────────────────────────────────
          lines = []
          if now_down:
              lines.append("🔴 *Site(s) DOWN*")
              for s in sorted(now_down):
                  code = now_down[s].split(":")[1] if ":" in now_down[s] else "?"
                  tag = "" if s in newly_down else " _(still)_"
                  lines.append(f"- {s} (HTTP {code}){tag}")
          if recovered:
              lines.append("")
              lines.append("✅ *Recovered:*")
              for s in sorted(recovered):
                  lines.append(f"- {s}")
          if not now_down and recovered:
              lines = ["✅ *All sites RECOVERED*"]
              for s in sorted(recovered):
                  lines.append(f"- {s}")

          # ── Send notification ───────────────────────────────────────
          should_notify = bool(now_down) or bool(recovered)
          if should_notify:
              text = "\n".join(lines)
              print(f"Sending: {text}")
              import urllib.parse
              data = urllib.parse.urlencode({
                  "chat_id": TG_CHAT, "parse_mode": "Markdown", "text": text
              }).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{TG_TOKEN}/sendMessage",
                  data=data, method="POST")
              urllib.request.urlopen(req)
          else:
              print("All UP, no state change — silent")

          # ── Persist state ───────────────────────────────────────────
          new_value = json.dumps(current, separators=(",", ":"))
          old_value = json.dumps(prev, separators=(",", ":")) if prev else ""
          if new_value != old_value:
              payload = json.dumps({"name": "UPTIME_SITES", "value": new_value}).encode()
              try:
                  req = urllib.request.Request(API, data=payload, headers={**HEADERS, "Content-Type": "application/json"}, method="PATCH")
                  urllib.request.urlopen(req)
                  print(f"State saved: {new_value}")
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      api_create = f"https://api.github.com/repos/{REPO}/actions/variables"
                      req = urllib.request.Request(api_create, data=payload, headers={**HEADERS, "Content-Type": "application/json"}, method="POST")
                      urllib.request.urlopen(req)
                      print(f"State created: {new_value}")
                  else:
                      raise

          # ── Exit code ───────────────────────────────────────────────
          exit(0 if not now_down else 1)
          PYEOF
