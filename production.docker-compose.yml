services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cekokam-app
    ports:
      - "8001:80"
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: /volumes/cekokam-app/storage/app
        target: /var/www/storage/app
      - type: bind
        source: /volumes/cekokam-app/storage/logs
        target: /var/www/storage/logs
      - type: bind
        source: /logs/nginx/cekokam
        target: /var/lib/nginx/logs
      - type: tmpfs
        target: /var/www/bootstrap/cache
      - type: tmpfs
        target: /var/www/storage/debugbar/
      - type: tmpfs
        target: /var/www/storage/framework/cache
      - type: tmpfs
        target: /var/www/storage/framework/sessions
      - type: tmpfs
        target: /var/www/storage/framework/views
      - type: tmpfs
        target: /var/lib/nginx/tmp
      - type: tmpfs
        target: /run/nginx
      - type: tmpfs
        target: /run/php
      - type: tmpfs
        target: /tmp
      - type: tmpfs
        target: /root
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  redis:
    image: redis:7-alpine
    container_name: cekokam-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile-worker
    container_name: cekokam-worker
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: /volumes/cekokam-app/storage/app
        target: /var/www/storage/app
      - type: bind
        source: /volumes/cekokam-app/storage/logs
        target: /var/www/storage/logs
    restart: always

volumes:
  redis-data:
